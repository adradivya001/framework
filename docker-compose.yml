services:
  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SUPABASE_URL=${SUPABASE_URL:-https://dummy.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY:-dummy-key}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ESCALATION_SLA_TIMEOUT=300000
      - WORKER_RETRY_ATTEMPTS=3
      - ROUTING_STALE_TIMEOUT=600000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - control-tower-net
    restart: unless-stopped

  db:
    image: postgres:15-bookworm
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=control_tower
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d control_tower" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control-tower-net

  redis:
    image: redis:7-bookworm
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control-tower-net

volumes:
  postgres_data:


networks:
  control-tower-net:
    driver: bridge
